services:
  - type: web
    name: deskshare-signaling
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://deskshare-chi.vercel.app,https://deskshare.vercel.app
